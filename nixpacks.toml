# ============================================================
# BizBook Pro — Nixpacks Config (v4.56 — PostgreSQL)
# ============================================================
# v4.56: Removed all SQLite references. Build no longer pushes
# schema during build (push happens at runtime via railway-start.js).
# This ensures the build works with PostgreSQL DATABASE_URL.
# ============================================================

[phases.setup]
nixPkgs = ['nodejs_20', 'openssl']
providers = ['node']

[phases.install]
cmds = [
  'rm -rf .next .turbo out dist node_modules/.cache',
  'npm install --no-audit --no-fund --prefer-offline',
  'npm cache clean --force'
]

[phases.build]
cmds = [
  'rm -f tsconfig.tsbuildinfo',
  'npx prisma generate',
  'NODE_OPTIONS="--max-old-space-size=2048" npx next build --webpack',
  'node postbuild.js'
]

[start]
cmd = 'node scripts/railway-start.js'
