# Fly.io — fly.toml configuration for BizBook Pro
# ============================================================
# Deploy to Fly.io (3 free shared VMs, 256MB RAM each):
#
#   1. Install flyctl:   curl -L https://fly.io/install.sh | sh
#   2. Login:            flyctl auth login
#   3. Launch:           flyctl launch --no-deploy
#   4. Create volume:    flyctl volumes create bizbook_data --size 1
#   5. Set secrets:      flyctl secrets set SESSION_SECRET="..." SMTP_USER="..." SMTP_PASS="..." TWOFACTOR_API_KEY="..."
#   6. Deploy:           flyctl deploy
#
# Free tier: 3 shared-cpu-1x VMs with 256MB RAM
# ============================================================

app = "bizbook-pro"
primary_region = "sin"  # Singapore (closest to India)

[build]
  dockerfile = "Dockerfile.render"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true  # Sleeps when idle (saves free hours)
  auto_start_machines = true  # Wakes on request
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

# Persistent volume for SQLite database
[[mounts]]
  source = "bizbook_data"
  destination = "/app/db"
  auto_extend_size_threshold = 80
  auto_extend_size_increment = "1GB"
  auto_extend_size_limit = "10GB"

# VM configuration (free tier)
[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
  cpus = 1

# Environment variables (set via: flyctl secrets set KEY=VALUE)
# SESSION_SECRET, SMTP_*, TWOFACTOR_*, RAZORPAY_* 
