# Render.com Blueprint for BizBook Pro
services:
  - type: web
    name: bizbook-pro
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && mkdir -p db && DATABASE_URL="file:./db/custom.db" npx prisma db push --skip-generate && npm run build
    startCommand: node .next/standalone/server.js
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./db/custom.db
      - key: SESSION_SECRET
        sync: false
      - key: PORT
        value: "3000"
      - key: HOSTNAME
        value: 0.0.0.0
      - key: NODE_OPTIONS
        value: --max-old-space-size=512
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: TWOFACTOR_API_KEY
        sync: false
      - key: TWOFACTOR_SENDER_ID
        value: BIZBOK
      - key: TWOFACTOR_TEMPLATE_NAME
        value: BizBook Pro
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
    disks:
      - name: bizbook-db
        mountPath: /opt/render/project/src/db
        sizeGB: 1
